<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vulnlog vulnerability report.">
    <meta name="referrer" content="no-referrer">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#15171b" media="(prefers-color-scheme: dark)">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; base-uri 'none'; form-action 'none'">
    <title>Vulnlog Report</title>
    <style>
        :root {
            --vl-bg: #ffffff;
            --vl-text: #14161a;
            --vl-text-secondary: #4a525c;
            --vl-border: #d6d8dc;
            --vl-surface: #f5f6f8;
            --vl-hover: #fafbfc;
            --vl-link: #1a4a8a;
            --vl-focus: #f200cf;

            /* Material-style accent colours used for row stripes. */
            --vl-stripe-critical: #f44336;
            --vl-stripe-high: #ff9800;
            --vl-stripe-medium: #ffcc32;
            --vl-stripe-low: #1976d2;
            --vl-stripe-positive: #7cb342;
            --vl-stripe-muted: #9aa0a6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --vl-bg: #15171b;
                --vl-text: #e8eaee;
                --vl-text-secondary: #a8adb6;
                --vl-border: #353841;
                --vl-surface: #1d1f24;
                --vl-hover: #25282e;
                --vl-link: #82b1ff;
            }
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--vl-bg);
            color: var(--vl-text);
            line-height: 1.55;
            font-size: 1.05rem;
        }

        a {
            color: var(--vl-link);
            text-decoration: underline;
        }

        a:hover {
            text-decoration: none;
        }

        a:focus-visible {
            outline: 2px solid var(--vl-focus);
            outline-offset: 2px;
            border-radius: 2px;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .skip-link {
            position: absolute;
            left: -9999px;
            top: 0;
            background: var(--vl-text);
            color: var(--vl-bg);
            padding: 0.5rem 1rem;
            z-index: 100;
            font-size: 0.95rem;
        }

        .skip-link:focus {
            left: 0;
        }

        .container {
            max-width: 92rem;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        header.page-header {
            padding: 1.75rem 0 1rem;
        }

        .title {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.2;
            margin: 0 0 0.25rem;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--vl-text-secondary);
            margin: 0;
        }

        .info-card {
            border: 1px solid var(--vl-border);
            border-radius: 0.4rem;
            padding: 1rem 1.25rem;
            margin: 1.25rem 0 1.5rem;
            background: var(--vl-bg);
        }

        .info-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 1.25rem 2rem;
        }

        @media (max-width: 720px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
        }

        .info-section-label {
            font-size: 1rem;
            font-weight: 600;
            color: var(--vl-text);
            margin: 0 0 0.5rem;
        }

        .info-meta {
            display: grid;
            grid-template-columns: max-content minmax(0, 1fr);
            gap: 0.2rem 0.75rem;
            margin: 0;
            font-size: 1rem;
        }

        .info-meta dt {
            color: var(--vl-text-secondary);
            font-weight: 500;
        }

        .info-meta dd {
            margin: 0;
            word-break: break-word;
        }

        .counts-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem 1rem;
            font-size: 1rem;
            margin: 0 0 0.4rem;
            align-items: baseline;
        }

        .counts-row:last-child {
            margin-bottom: 0;
        }

        .counts-row-label {
            font-weight: 600;
            color: var(--vl-text-secondary);
            min-width: 6rem;
        }

        .counts-item {
            white-space: nowrap;
        }

        .counts-num {
            font-weight: 600;
            color: var(--vl-text);
            font-variant-numeric: tabular-nums;
        }

        .counts-name {
            color: var(--vl-text-secondary);
        }

        .table-region {
            margin: 0 0 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1rem;
            table-layout: fixed;
        }

        th, td {
            padding: 0.5em 0.75em;
            text-align: left;
            border: 1px solid var(--vl-border);
            vertical-align: top;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        th {
            background: var(--vl-surface);
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--vl-text-secondary);
            white-space: nowrap;
        }

        th[title] {
            cursor: help;
        }

        tbody tr:hover td {
            background: var(--vl-hover);
        }

        /* Row stripe: coloured 4px on the first cell, encoding actionability at-a-glance. */
        tbody td:first-child {
            border-left-width: 4px;
        }

        tr[data-row-tone="critical"] td:first-child {
            border-left-color: var(--vl-stripe-critical);
        }

        tr[data-row-tone="high"] td:first-child {
            border-left-color: var(--vl-stripe-high);
        }

        tr[data-row-tone="medium"] td:first-child {
            border-left-color: var(--vl-stripe-medium);
        }

        tr[data-row-tone="low"] td:first-child {
            border-left-color: var(--vl-stripe-low);
        }

        tr[data-row-tone="positive"] td:first-child {
            border-left-color: var(--vl-stripe-positive);
        }

        tr[data-row-tone="muted"] td:first-child {
            border-left-color: var(--vl-stripe-muted);
        }

        .col-ids {
            font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
            font-size: 1rem;
        }

        .col-ids .alias {
            color: var(--vl-text-secondary);
            font-size: 0.9rem;
        }

        /* Details cell layout */
        .col-details > * + * {
            margin-top: 0.4rem;
        }

        .details-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem 1.25rem;
            font-size: 1rem;
            align-items: center;
        }

        .details-block {
            font-size: 1rem;
        }

        .details-label {
            font-weight: 600;
            color: var(--vl-text-secondary);
            margin-right: 0.4rem;
        }

        .details-note {
            display: block;
            margin-top: 0.15rem;
            color: var(--vl-text-secondary);
            font-size: 0.95rem;
            font-style: italic;
        }

        .details-block .details-label[data-block-label] {
            display: inline-block;
        }

        [data-tip] {
            cursor: help;
        }

        .releases-fixed {
            display: block;
            margin-top: 0.25rem;
            color: var(--vl-text-secondary);
            font-size: 0.9rem;
        }

        .releases-fixed-label {
            font-weight: 600;
            margin-right: 0.25rem;
        }

        .empty-state {
            padding: 2rem 0.75rem;
            text-align: center;
            color: var(--vl-text-secondary);
            font-style: italic;
        }

        /* The State column uses a small neutral chip; no tone. */
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.4;
            background: var(--vl-surface);
            color: var(--vl-text);
            border: 1px solid var(--vl-border);
            white-space: nowrap;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--vl-border);
            padding: 1rem 0;
            margin-top: 2rem;
            font-size: 0.95rem;
            color: var(--vl-text-secondary);
        }

        .footer-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.5rem;
        }

        .footer-mark {
            display: inline-flex;
            align-items: center;
            color: var(--vl-text-secondary);
            text-decoration: none;
        }

        .footer-mark:hover {
            text-decoration: underline;
        }

        .footer-mark svg {
            height: 1.1rem;
            width: auto;
            vertical-align: middle;
        }

        .footer-mark .logo-text {
            fill: currentColor;
        }

        .footer-version {
            font-variant-numeric: tabular-nums;
        }

        /* Mobile: stack each row as a labelled card. Scoped to screen so print is untouched. */
        @media screen and (max-width: 720px) {
            .container {
                padding: 0 1rem;
            }

            .title {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 1.05rem;
            }

            table, thead, tbody, tr, td {
                display: block;
                width: 100%;
            }

            thead {
                position: absolute;
                left: -9999px;
            }

            tbody tr {
                border: 1px solid var(--vl-border);
                border-left-width: 4px;
                border-radius: 0.4rem;
                margin: 0 0 0.75rem;
                background: var(--vl-bg);
            }

            tbody td {
                border: 0;
                border-top: 1px solid var(--vl-border);
                padding: 0.5rem 0.75rem;
            }

            tbody tr td:first-child {
                border-top: 0;
            }

            tbody td::before {
                content: attr(data-label);
                display: block;
                font-size: 0.8rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.03em;
                color: var(--vl-text-secondary);
                margin-bottom: 0.15rem;
            }

            /* Row tone moves from first-cell border to the card's left border. */
            tbody tr[data-row-tone="critical"] {
                border-left-color: var(--vl-stripe-critical);
            }

            tbody tr[data-row-tone="high"] {
                border-left-color: var(--vl-stripe-high);
            }

            tbody tr[data-row-tone="medium"] {
                border-left-color: var(--vl-stripe-medium);
            }

            tbody tr[data-row-tone="low"] {
                border-left-color: var(--vl-stripe-low);
            }

            tbody tr[data-row-tone="positive"] {
                border-left-color: var(--vl-stripe-positive);
            }

            tbody tr[data-row-tone="muted"] {
                border-left-color: var(--vl-stripe-muted);
            }

            .footer-mark svg {
                height: 1.5rem;
            }
        }

        /* Print */
        @page {
            size: A4;
            margin: 1.2cm;
        }

        @media print {
            :root {
                --vl-bg: #ffffff;
                --vl-text: #000000;
                --vl-text-secondary: #333333;
                --vl-border: #888888;
                --vl-surface: #f0f0f0;
                --vl-hover: #ffffff;
            }

            body {
                font-size: 10pt;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .skip-link {
                display: none !important;
            }

            a, a:visited {
                color: inherit;
                text-decoration: none;
            }

            header.page-header {
                padding-top: 0;
            }

            .title {
                font-size: 15pt;
            }

            .subtitle {
                font-size: 11pt;
            }

            .info-card {
                margin: 0.5rem 0 1rem;
                padding: 0.5rem 0.75rem;
                break-inside: avoid;
            }

            .table-region {
                margin-bottom: 0.5rem;
            }

            table {
                font-size: 9pt;
            }

            thead {
                display: table-header-group;
            }

            tfoot {
                display: table-footer-group;
            }

            tr, td, th {
                break-inside: avoid;
                page-break-inside: avoid;
            }

            tbody tr:hover td {
                background: transparent;
            }

            .badge {
                font-size: 8.5pt;
                padding: 0 0.25rem;
                white-space: normal;
                line-height: 1.2;
            }

            .col-ids {
                font-size: 8.5pt;
            }

            .col-ids .alias {
                font-size: 8pt;
            }

            .details-note,
            .releases-fixed {
                font-size: 8.5pt;
            }

            footer {
                border-top-color: #888888;
                margin-top: 1rem;
            }
        }
    </style>
</head>
<body>
<a href="#vuln-table" class="skip-link">Skip to vulnerability table</a>

<header class="page-header">
    <div class="container">
        <h1 class="title" id="report-heading"></h1>
        <p class="subtitle" id="report-meta"></p>
    </div>
</header>

<main>
    <div class="container">
        <section class="info-card" aria-labelledby="info-card-heading">
            <h2 id="info-card-heading" class="visually-hidden">Report metadata and counts</h2>
            <div class="info-grid">
                <div>
                    <p class="info-section-label">About</p>
                    <dl class="info-meta" id="report-meta-list"></dl>
                </div>
                <div id="report-counts" hidden>
                    <p class="info-section-label">Summary</p>
                    <div id="counts-rows"></div>

        <section class="table-region" aria-labelledby="vulns-heading">

                <colgroup id="vuln-colgroup"></colgroup>
                <thead>
                <tr id="vuln-head"></tr>
                </thead>
                <tbody id="vuln-tbody"></tbody>
            </table>
        </section>
    </div>
</main>

<script>
    var VULNLOG_DATA = {"project":{"organization":"Acme Corp","name":"Acme Web App","author":"Security Team"},"generatedAt":"2026-05-02T10:30:00Z","vulnlogVersion":"1.2.3-test","inputs":["frontend.vl","backend.vl"],"filter":{"release":"1.1.0","tags":["production"],"reporter":"trivy"},"entries":[{"primaryId":"CVE-2026-1111","ids":["CVE-2026-1111","GHSA-aaaa-bbbb-cccc"],"state":"open","verdict":"affected","severity":"critical","verdictDetail":null,"shortDescription":"Critical RCE in example-lib","analysis":"Confirmed exploitable on the public ingress path; patch in progress.","releases":["1.0.0","1.1.0"],"fixedIn":["1.2.0"]},{"primaryId":"CVE-2026-2222","ids":["CVE-2026-2222"],"state":"open","verdict":"not affected","severity":null,"verdictDetail":"vulnerable code not in execute path","shortDescription":null,"analysis":null,"releases":["1.1.0"],"fixedIn":[]},{"primaryId":"CVE-2026-3333","ids":["CVE-2026-3333"],"state":"resolved","verdict":"affected","severity":"medium","verdictDetail":null,"shortDescription":"DoS via large payload","analysis":"Mitigated by request size limits at the edge.","releases":["1.0.0"],"fixedIn":["1.0.1"]}]};
    (function () {
        var COLUMN_META = {
            ids: {label: 'IDs', width: '22%', tooltip: 'Vulnerability identifiers (CVE, GHSA, SNYK)'},
            state: {label: 'State', width: '11%', tooltip: 'Workflow state'},
            details: {label: 'Details', width: '51%', tooltip: 'Verdict, severity, description and analysis'},
            releases: {label: 'Releases', width: '16%', tooltip: 'Affected releases (and fix releases when available)'}
        };

        var STATE_ORDER = ['open', 'under_investigation', 'resolved', 'dismissed'];
        var SEVERITY_ORDER = ['critical', 'high', 'medium', 'low'];

        var SEVERITY_TOOLTIPS = {
            'critical': 'Critical: Immediate action required. Exploitable with severe impact.',
            'high': 'High: Action required. Significant impact if exploited.',
            'medium': 'Medium: Action recommended. Moderate impact.',
            'low': 'Low: Minimal impact or difficult to exploit.'
        };

        var d = VULNLOG_DATA;

        document.title = d.project.name + ' · Vulnlog Report';
        document.getElementById('report-heading').textContent =
            'Vulnerability Report · ' + d.project.name;
        document.getElementById('report-meta').textContent =
            d.project.organization + ' · ' + d.project.author;

        renderMetaList(d);
        renderFooterVersion(d.vulnlogVersion);

        var cols = ['ids', 'state', 'details', 'releases'];
        renderColgroup(cols);
        renderHead(cols);

        if (d.entries.length === 0) {
            renderEmptyState(cols.length);
            renderSummary(d.entries);
            return;
        }

        renderSummary(d.entries);
        renderRows(d.entries, cols);

        function renderMetaList(d) {
            var dl = document.getElementById('report-meta-list');
            appendDt(dl, 'Generated', renderTimestamp(d.generatedAt));
            if (d.inputs && d.inputs.length > 0) {
                appendDt(dl, 'Inputs', d.inputs.join(', '));
            }
            var filterText = formatFilter(d.filter);
            appendDt(dl, 'Filter', filterText || 'none');
        }

        function appendDt(dl, label, value) {
            var dt = document.createElement('dt');
            dt.textContent = label;
            var dd = document.createElement('dd');
            if (value instanceof Node) dd.appendChild(value); else dd.textContent = value;
            dl.appendChild(dt);
            dl.appendChild(dd);
        }

        function renderTimestamp(iso) {
            var t = document.createElement('time');
            t.setAttribute('datetime', iso);
            var display;
            try {
                display = new Date(iso).toISOString().replace('T', ' ').replace(/\.\d+Z$/, ' UTC').replace(/Z$/, ' UTC');
            } catch (_) {
                display = iso;
            }
            t.textContent = display;
            return t;
        }

        function formatFilter(f) {
            if (!f) return '';
            var parts = [];
            if (f.release) parts.push('release=' + f.release);
            if (f.tags && f.tags.length > 0) parts.push('tags=' + f.tags.join(','));
            if (f.reporter) parts.push('reporter=' + f.reporter);
            return parts.join(' · ');
        }

        function renderFooterVersion(v) {
            if (!v) return;
            document.getElementById('footer-version').textContent = '· ' + v;
        }

        function renderColgroup(cols) {
            var cg = document.getElementById('vuln-colgroup');
            cols.forEach(function (k) {
                var col = document.createElement('col');
                col.style.width = COLUMN_META[k].width;
                cg.appendChild(col);
            });
        }

        function renderHead(cols) {
            var tr = document.getElementById('vuln-head');
            cols.forEach(function (k) {
                var th = document.createElement('th');
                th.setAttribute('scope', 'col');
                th.textContent = COLUMN_META[k].label;
                if (COLUMN_META[k].tooltip) th.setAttribute('title', COLUMN_META[k].tooltip);
                tr.appendChild(th);
            });
        }

        function renderEmptyState(colspan) {
            var tbody = document.getElementById('vuln-tbody');
            var tr = document.createElement('tr');
            var td = document.createElement('td');
            td.setAttribute('colspan', String(colspan));
            td.className = 'empty-state';
            td.textContent = 'No vulnerability entries to display.';
            tr.appendChild(td);
            tbody.appendChild(tr);
        }

        function renderSummary(entries) {
            var container = document.getElementById('report-counts');
            var rows = document.getElementById('counts-rows');
            container.hidden = false;

            // Total row uses the same .counts-row layout as State / Open severity.
            var n = entries.length;
            var totalRow = document.createElement('div');
            totalRow.className = 'counts-row';
            var totalLbl = document.createElement('span');
            totalLbl.className = 'counts-row-label';
            totalLbl.textContent = 'Total';
            totalRow.appendChild(totalLbl);
            totalRow.appendChild(buildCountsItem(n, n === 1 ? 'entry' : 'entries'));
            rows.appendChild(totalRow);

            if (entries.length === 0) return;

            var stateCounts = countBy(entries, function (e) {
                return e.state;
            });
            rows.appendChild(buildCountsRow('State', stateCounts, STATE_ORDER));

            var openSeverity = countBy(
                entries.filter(function (e) {
                    return e.state === 'open';
                }),
                function (e) {
                    return e.severity;
                }
            );
            if (Object.keys(openSeverity).length > 0) {
                rows.appendChild(buildCountsRow('Open severity', openSeverity, SEVERITY_ORDER));
            }
        }

        function countBy(entries, keyFn) {
            var counts = {};
            entries.forEach(function (e) {
                var k = keyFn(e);
                if (!k) return;
                counts[k] = (counts[k] || 0) + 1;
            });
            return counts;
        }

        function buildCountsRow(label, counts, order) {
            var row = document.createElement('div');
            row.className = 'counts-row';
            var lbl = document.createElement('span');
            lbl.className = 'counts-row-label';
            lbl.textContent = label;
            row.appendChild(lbl);
            order.forEach(function (k) {
                if (!counts[k]) return;
                row.appendChild(buildCountsItem(counts[k], label_(k)));
            });
            // Render any unrecognised keys after the known order so we never silently drop data.
            Object.keys(counts).forEach(function (k) {
                if (order.indexOf(k) !== -1) return;
                row.appendChild(buildCountsItem(counts[k], label_(k)));
            });
            return row;
        }

        function buildCountsItem(count, displayName) {
            var item = document.createElement('span');
            item.className = 'counts-item';
            var num = document.createElement('span');
            num.className = 'counts-num';
            num.textContent = String(count);
            var name = document.createElement('span');
            name.className = 'counts-name';
            name.textContent = ' ' + displayName;
            item.appendChild(num);
            item.appendChild(name);
            return item;
        }

        function renderRows(entries, cols) {
            var tbody = document.getElementById('vuln-tbody');
            entries.forEach(function (e) {
                var tr = document.createElement('tr');
                var rowTone = rowToneFor(e);
                if (rowTone) tr.setAttribute('data-row-tone', rowTone);
                cols.forEach(function (k) {
                    tr.appendChild(buildCell(k, e));
                });
                tbody.appendChild(tr);
            });
        }

        // Row stripe rule:
        //   resolved              -> green (positive)
        //   dismissed             -> grey (muted)
        //   under_investigation   -> no stripe
        //   open + severity       -> severity colour (critical/high/medium/low)
        //   open + not affected   -> green (positive)
        //   open (otherwise)      -> no stripe
        function rowToneFor(e) {
            if (e.state === 'resolved') return 'positive';
            if (e.state === 'dismissed') return 'muted';
            if (e.state === 'under_investigation') return null;
            if (e.severity && SEVERITY_ORDER.indexOf(e.severity) !== -1) return e.severity;
            if (e.verdict === 'not affected') return 'positive';
            return null;
        }

        function buildCell(col, e) {
            var td = document.createElement('td');
            td.setAttribute('data-label', COLUMN_META[col].label);
            switch (col) {
                case 'ids':
                    return buildIdsCell(td, e);
                case 'state':
                    return buildStateCell(td, e);
                case 'details':
                    return buildDetailsCell(td, e);
                case 'releases':
                    return buildReleasesCell(td, e);
            }
            return td;
        }

        function buildIdsCell(td, e) {
            td.className = 'col-ids';
            td.appendChild(document.createTextNode(e.primaryId));
            var aliases = (e.ids || []).filter(function (id) {
                return id !== e.primaryId;
            });
            aliases.forEach(function (id) {
                td.appendChild(document.createElement('br'));
                var span = document.createElement('span');
                span.className = 'alias';
                span.textContent = id;
                td.appendChild(span);
            });
            return td;
        }

        function buildStateCell(td, e) {
            var span = document.createElement('span');
            span.className = 'badge';
            span.textContent = label_(e.state);
            td.appendChild(span);
            return td;
        }

        function buildDetailsCell(td, e) {
            td.className = 'col-details';

            var meta = document.createElement('div');
            meta.className = 'details-meta';

            // Verdict
            var verdictSpan = document.createElement('span');
            verdictSpan.appendChild(labelSpan('Verdict'));
            var verdictBadge = document.createElement('span');
            verdictBadge.className = 'badge';
            verdictBadge.textContent = label_(e.verdict);
            verdictSpan.appendChild(verdictBadge);
            if (e.verdictDetail) {
                var note = document.createElement('span');
                note.className = 'details-note';
                note.textContent = e.verdictDetail;
                verdictSpan.appendChild(note);
            }
            meta.appendChild(verdictSpan);

            // Severity (only if present)
            if (e.severity) {
                var sevSpan = document.createElement('span');
                sevSpan.appendChild(labelSpan('Severity'));
                var sevBadge = document.createElement('span');
                sevBadge.className = 'badge';
                sevBadge.textContent = label_(e.severity);
                if (SEVERITY_TOOLTIPS[e.severity]) {
                    sevBadge.setAttribute('title', SEVERITY_TOOLTIPS[e.severity]);
                    sevBadge.setAttribute('data-tip', '');
                }
                sevSpan.appendChild(sevBadge);
                meta.appendChild(sevSpan);
            }

            td.appendChild(meta);

            // Description (only if present)
            if (e.shortDescription) {
                var desc = document.createElement('div');
                desc.className = 'details-block';
                desc.appendChild(labelSpan('Description'));
                desc.appendChild(document.createTextNode(e.shortDescription));
                td.appendChild(desc);
            }

            // Analysis (only if present)
            if (e.analysis) {
                var ana = document.createElement('div');
                ana.className = 'details-block';
                ana.appendChild(labelSpan('Analysis'));
                ana.appendChild(document.createTextNode(e.analysis));
                td.appendChild(ana);
            }

            return td;
        }

        function buildReleasesCell(td, e) {
            td.appendChild(document.createTextNode((e.releases || []).join(', ')));
            if (e.fixedIn && e.fixedIn.length > 0) {
                var line = document.createElement('span');
                line.className = 'releases-fixed';
                var lbl = document.createElement('span');
                lbl.className = 'releases-fixed-label';
                lbl.textContent = 'Fixed in';
                line.appendChild(lbl);
                line.appendChild(document.createTextNode(e.fixedIn.join(', ')));
                td.appendChild(line);
            }
            return td;
        }

        function labelSpan(text) {
            var el = document.createElement('span');
            el.className = 'details-label';
            el.textContent = text;
            return el;
        }

        function label_(v) {
            // Display "under_investigation" as the shorter "Investigating" everywhere.
            if (v === 'under_investigation') return 'Investigating';
            if (typeof v !== 'string' || v.length === 0) return String(v);
            var s = v.replace(/_/g, ' ');
            return s.charAt(0).toUpperCase() + s.slice(1);
        }
    })();
</script>
</body>
</html>
