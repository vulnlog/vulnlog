# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration
#
# Renders the CHANGELOG.md sections (Keep a Changelog format).
# Typical invocation (before the tag exists, from the release preparation branch):
#   git-cliff --config .github/changelog.toml --unreleased --tag vX.Y.Z \
#     --github-token "$(gh auth token)" --prepend CHANGELOG.md

[remote.github]
owner = "vulnlog"
repo = "vulnlog"

[changelog]
# A Tera template to be rendered as the changelog's header.
# See https://keats.github.io/tera/docs/#introduction
header = """
# Changelog\n
All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""
# A Tera template to be rendered for each release in the changelog.
# See https://keats.github.io/tera/docs/#introduction
body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {%- for commit in commits %}
        - {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | split(pat="\n") | first | upper_first | trim }}\
            {% if commit.remote.username %} by @{{ commit.remote.username }}{%- endif -%}
            {% if commit.remote.pr_number %} in \
            [#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }}) \
            {%- endif -%}
    {% endfor %}
{% endfor %}

{%- if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
    ### New Contributors
{%- endif -%}

{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
  * @{{ contributor.username }} made their first contribution
    {%- if contributor.pr_number %} in \
      [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}) \
    {%- endif %}
{%- endfor %}\n

{%- if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}{% raw %}\n{% endraw -%}{% endif %}

"""
# A Tera template to be rendered as the changelog's footer.
# See https://keats.github.io/tera/docs/#introduction
footer = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% for release in releases -%}
    {% if release.version -%}
        {% if release.previous.version -%}
            [{{ release.version | trim_start_matches(pat="v") }}]: \
                {{ self::remote_url() }}/compare/{{ release.previous.version }}...{{ release.version }}
        {% endif -%}
    {% else -%}
        [unreleased]: {{ self::remote_url() }}/compare/{{ release.previous.version }}...HEAD
    {% endif -%}
{% endfor %}
<!-- generated by git-cliff -->
"""
# Remove leading and trailing whitespaces from the changelog's body.
trim = true

[git]
# Parse commits according to the conventional commits specification.
# See https://www.conventionalcommits.org
conventional_commits = true
# Include non-conventional commits to preserve historical changelog entries.
# Noise is handled by the skip rules in commit_parsers instead.
filter_unconventional = false
# An array of regex based parsers to modify commit messages prior to further processing.
commit_preprocessors = [
    # Remove issue numbers.
    { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "" },
]
# An array of regex based parsers for extracting data from the commit message.
# Assigns commits to groups.
# The <!-- N --> markers order the groups; they are stripped when rendering.
commit_parsers = [
    # Skip release-machinery and housekeeping commits
    { message = "^chore\\(release\\)", skip = true },
    { message = "^docs\\(changelog\\)", skip = true },
    { message = "^ci", skip = true },
    { message = "^style", skip = true },
    { message = "^test", skip = true },
    { message = "^chore", skip = true },
    { message = "^Release version", skip = true },
    { message = "^Start next release", skip = true },
    { message = "^Update for refs/tags", skip = true },
    { message = "^Update for v", skip = true },
    # User-facing changes (conventional commits)
    { message = "^feat", group = "<!-- 0 -->Added" },
    { message = "^refactor", group = "<!-- 1 -->Changed" },
    { message = "^fix", group = "<!-- 2 -->Fixed" },
    { message = "^perf", group = "<!-- 3 -->Performance" },
    { message = "^docs", group = "<!-- 4 -->Documentation" },
    # Catch-all for older non-conventional commits
    { message = "^.*", group = "<!-- 1 -->Changed" },
]
# Prevent commits that are breaking from being excluded by commit parsers.
protect_breaking_commits = true
# Exclude commits that are not matched by any commit parser.
filter_commits = false
# Regex to select git tags that represent releases.
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+(-rc[0-9]+)?$"
# Regex to exclude git tags after applying the tag_pattern.
# Release-candidate tags are excluded so their commits roll up into the eventual final release.
ignore_tags = "-rc[0-9]+$"
# Order releases topologically instead of chronologically.
topo_order = false
# Order of commits in each group/release within the changelog.
# Allowed values: newest, oldest
sort_commits = "newest"
