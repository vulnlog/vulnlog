name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
      - vl-0.9
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Check
        run: ./gradlew check

  native-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build native image
        run: ./gradlew :next:nativeCompile --no-configuration-cache
      - name: Upload native image
        uses: actions/upload-artifact@v4
        with:
          name: vulnlog-linux-amd64
          path: next/cli-app/build/native/nativeCompile/vulnlog
          retention-days: 7
