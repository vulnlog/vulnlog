name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
      - vl-0.9
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            chore
            ci

  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Check
        run: ./gradlew check

  native-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build native image
        run: ./gradlew :next:nativeCompile --no-configuration-cache
      - name: Upload native image
        uses: actions/upload-artifact@v4
        with:
          name: vulnlog-linux-amd64
          path: next/cli-app/build/native/nativeCompile/vulnlog
          retention-days: 7

  publish-docker:
    name: Publish snapshot Docker image
    needs: [ native-image ]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download Linux native image
        uses: actions/download-artifact@v4
        with:
          name: vulnlog-linux-amd64
          path: next/cli-app/build/native/nativeCompile
      - name: Mark binary as executable
        run: chmod +x next/cli-app/build/native/nativeCompile/vulnlog
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push snapshot image
        uses: docker/build-push-action@v6
        with:
          context: next/cli-app
          push: true
          tags: ghcr.io/${{ github.repository }}:snapshot
