name: Continuous Deployment

on:
  push:
    tags:
      - "v0.9.*"

permissions:
  contents: write
  discussions: write

jobs:

  publish-dsl:
    name: Publish DSL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Publish DSL to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USER }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ./gradlew clean publishAndReleaseToMavenCentral --no-configuration-cache -PappVersion="$VERSION"

  publish-gradle-plugin:
    name: Publish Gradle plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Publish Gradle plugin
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ./gradlew :gradle-plugin:publishPlugins -Pgradle.publish.key=${{ secrets.GRADLE_PLUGIN_KEY }} -Pgradle.publish.secret=${{ secrets.GRADLE_PLUGIN_SECRET }} -PappVersion="$VERSION"

  publish-release:
    name: Publish release
    needs: [ publish-dsl, publish-gradle-plugin ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Create project ZIP
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ./gradlew clean :cli:distZip -PappVersion="$VERSION"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Vulnlog ${{ github.ref_name }}"
          prerelease: true
          body: |
            👉 Full Changelog: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md
          files: cli-app/cli/build/distributions/*.zip
      - name: Create a new GitHub discussion
        id: create-discussion
        uses: abirismyname/create-discussion@main
        with:
          title: Vulnlog ${{ github.ref_name }} is released
          body: |
            Vulnlog ${{ github.ref_name }} is released!
            
            For a full description of changes, take a look at our [release notes](https://github.com/vulnlog/vulnlog/releases/tag/${{ github.ref_name }}).
          category-name: Announcements
          github-token: ${{ secrets.GITHUB_TOKEN }}
