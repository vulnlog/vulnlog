name: Security Scanning

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  vulnlog:
    name: Generate Vulnlog files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run Vulnlog
        id: vulnlog
        uses: ./gh-action

      - name: Upload suppression files
        uses: actions/upload-artifact@v7
        with:
          name: suppressions
          include-hidden-files: true
          path: |
            .snyk
            .trivyignore.yaml

      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: ${{ steps.vulnlog.outputs.report-file }}

  snyk:
    name: Snyk Open Source
    needs: [ vulnlog ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download suppression files
        uses: actions/download-artifact@v8
        with:
          name: suppressions

      - name: Run Snyk
        id: snyk
        uses: snyk/actions/gradle@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_API_KEY }}
        with:
          args: --sarif-file-output=snyk-results.sarif --policy-path=.snyk --all-sub-projects --severity-threshold=medium

      - name: Upload Snyk SARIF to GitHub
        if: always() && hashFiles('snyk-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-results.sarif
          category: snyk

  trivy:
    name: Trivy Vulnerability Scan
    needs: [ vulnlog ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download suppression files
        uses: actions/download-artifact@v8
        with:
          name: suppressions

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          trivyignores: .trivyignore.yaml
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy
