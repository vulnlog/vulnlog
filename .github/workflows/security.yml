name: Security Scanning

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  suppress:
    name: Generate suppression files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate suppression files
        continue-on-error: true
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            ghcr.io/${{ github.repository }}:latest \
            suppress vulnlog.yaml -o /work

      - name: Ensure suppression files exist
        run: touch .snyk .trivyignore.yaml

      - name: Upload suppression files
        uses: actions/upload-artifact@v4
        with:
          name: suppressions
          include-hidden-files: true
          path: |
            .snyk
            .trivyignore.yaml

  snyk:
    name: Snyk Open Source
    needs: [ suppress ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download suppression files
        uses: actions/download-artifact@v4
        with:
          name: suppressions

      - name: Run Snyk
        id: snyk
        uses: snyk/actions/gradle@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_API_KEY }}
        with:
          args: --sarif-file-output=snyk-results.sarif --policy-path=.snyk --all-sub-projects

      - name: Upload Snyk SARIF to GitHub
        if: always() && hashFiles('snyk-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-results.sarif
          category: snyk

  trivy:
    name: Trivy Vulnerability Scan
    needs: [ suppress ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download suppression files
        uses: actions/download-artifact@v4
        with:
          name: suppressions

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          trivyignores: .trivyignore.yaml

      - name: Upload Trivy SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy
