name: Continuous Deployment

on:
  push:
    tags:
      - "v0.1[0-9].*"

permissions:
  contents: write
  discussions: write
  packages: write
  pages: write
  id-token: write

jobs:
  generate-changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_notes_body: ${{ steps.release-notes.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/changelog.toml
          args: --tag ${{ github.ref }} --github-repo ${{ github.repository }}
        env:
          OUTPUT: CHANGELOG.md
      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): update for ${{ github.ref }}" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: release-notes
        with:
          config: .github/release-notes.toml
          args: --latest --github-repo ${{ github.repository }}

  build-native-images:
    name: Build native image (${{ matrix.artifact-name }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: vulnlog-linux-amd64
          - os: macos-latest
            artifact-name: vulnlog-macos-aarch64
          - os: windows-latest
            artifact-name: vulnlog-windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build native image
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ./gradlew :cli-app:nativeCompile --no-configuration-cache -PappVersion="$VERSION"
      - name: Upload native image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: modules/cli-app/build/native/nativeCompile/vulnlog${{ runner.os == 'Windows' && '.exe' || '' }}

  publish-release:
    name: Publish release
    needs: [ generate-changelog, build-native-images ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build JVM distribution
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ./gradlew clean :cli-app:distZip -PappVersion="$VERSION"
      - name: Download native images
        uses: actions/download-artifact@v4
        with:
          pattern: vulnlog-*
          path: native-images
      - name: Package native images
        run: |
          for dir in native-images/vulnlog-*/; do
            name=$(basename "$dir")
            (cd "$dir" && zip "../${name}.zip" *)
          done
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Vulnlog ${{ github.ref_name }}"
          prerelease: true
          body: |
            ${{needs.generate-changelog.outputs.release_notes_body}}

            👉 Full Changelog: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md
          files: |
            modules/cli-app/build/distributions/*.zip
            native-images/*.zip
      - name: Create a new GitHub discussion
        id: create-discussion
        uses: abirismyname/create-discussion@main
        with:
          title: Vulnlog ${{ github.ref_name }} is released
          body: |
            Vulnlog ${{ github.ref_name }} is released!
            
            For a full description of changes, take a look at our [release notes](https://github.com/vulnlog/vulnlog/releases/tag/${{ github.ref_name }}).
          category-name: Announcements
          github-token: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    name: Deploy website and docs to GitHub Pages
    needs: [ publish-release ]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Build Antora docs
        run: npx antora antora-playbook.yml
      - name: Compose site
        run: |
          mkdir -p _site/docs _site/schema
          cp -r website/index.html website/css website/favicon.ico website/robots.txt website/sitemap.xml website/.well-known _site/
          cp -r build/docs/* _site/docs/
          cp schema/*.json _site/schema/
          echo 'vulnlog.dev' > _site/CNAME
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-docker:
    name: Publish Docker image
    needs: [ build-native-images ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download Linux native image
        uses: actions/download-artifact@v4
        with:
          name: vulnlog-linux-amd64
          path: modules/cli-app/build/native/nativeCompile
      - name: Mark binary as executable
        run: chmod +x modules/cli-app/build/native/nativeCompile/vulnlog
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: modules/cli-app
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
