name: Continuous Deployment

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"
      - "!v0.9.*"

permissions:
  contents: read

jobs:
  generate-changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      release_notes_body: ${{ steps.release-notes.outputs.content || steps.release-notes-rc.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/changelog.toml
          args: --tag ${{ github.ref_name }} --github-repo ${{ github.repository }}
        env:
          OUTPUT: CHANGELOG.md
      - name: Commit CHANGELOG.md
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): update for ${{ github.ref_name }}" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Generate release notes
        if: ${{ !contains(github.ref_name, '-') }}
        uses: orhun/git-cliff-action@v4
        id: release-notes
        with:
          config: .github/release-notes.toml
          args: --latest --github-repo ${{ github.repository }}
      - name: Release notes for RC
        if: ${{ contains(github.ref_name, '-') }}
        id: release-notes-rc
        run: |
          {
            echo 'content<<EOF'
            echo '🚧 Release candidate. Final release notes will be published with the final version.'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  build-native-images:
    name: Build native image (${{ matrix.artifact-name }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: vulnlog-linux-amd64
          - os: macos-latest
            artifact-name: vulnlog-macos-aarch64
          - os: windows-latest
            artifact-name: vulnlog-windows-amd64
    uses: ./.github/workflows/build-native.yaml
    with:
      os: ${{ matrix.os }}
      artifact-name: ${{ matrix.artifact-name }}
      app-version: ${{ github.ref_name }}

  publish-release:
    name: Publish release
    needs: [ generate-changelog, build-native-images ]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      discussions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up JVM toolchain
        uses: ./.github/actions/setup-jvm
      - name: Build JVM distribution
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ./gradlew clean :cli-app:distZip -PappVersion="$VERSION"
      - name: Download native images
        uses: actions/download-artifact@v8
        with:
          pattern: vulnlog-*
          path: native-images
      - name: Package native images
        run: |
          for dir in native-images/vulnlog-*/; do
            name=$(basename "$dir")
            (cd "$dir" && zip "../${name}.zip" *)
          done
      - name: Render install scripts
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed "s|^VERSION=\".*\"|VERSION=\"${VERSION}\"|" \
              install/install.sh.template > install-vulnlog.sh
          cp install/uninstall.sh.template uninstall-vulnlog.sh
          chmod +x install-vulnlog.sh uninstall-vulnlog.sh
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "Vulnlog ${{ github.ref_name }}"
          prerelease: true
          body: |
            ${{needs.generate-changelog.outputs.release_notes_body}}

            👉 Full Changelog: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md
          files: |
            modules/cli-app/build/distributions/*.zip
            native-images/*.zip
            install-vulnlog.sh
            uninstall-vulnlog.sh
      - name: Create a new GitHub discussion
        id: create-discussion
        if: ${{ !contains(github.ref_name, '-') }}
        uses: abirismyname/create-discussion@c2b7c825241769dda523865ae444a879f6bbd0e0 # v2.1.0
        with:
          title: Vulnlog ${{ github.ref_name }} is released
          body: |
            Vulnlog ${{ github.ref_name }} is released!

            For a full description of changes, take a look at our [release notes](https://github.com/vulnlog/vulnlog/releases/tag/${{ github.ref_name }}).
          category-name: Announcements
          github-token: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    name: Deploy website and docs to GitHub Pages
    needs: [ publish-release ]
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - name: Build Antora docs
        run: npx antora antora-playbook.yml
      - name: Resolve security report run id
        id: report-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow=security.yml \
            --status=success \
            --branch=main \
            --limit=1 \
            --json databaseId \
            -q '.[0].databaseId' || true)
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "No successful security run found; skipping report bundle."
            echo "run-id=" >> "$GITHUB_OUTPUT"
          else
            echo "run-id=$run_id" >> "$GITHUB_OUTPUT"
          fi
      - name: Download latest security report
        if: steps.report-run.outputs.run-id != ''
        uses: actions/download-artifact@v8
        with:
          name: reports
          path: _report
          run-id: ${{ steps.report-run.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Compose site
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          mkdir -p _site/docs _site/schema
          cp -r website/index.html website/css website/favicon.ico website/robots.txt website/sitemap.xml website/.well-known _site/
          cp -r build/docs/* _site/docs/
          cp schema/*.json _site/schema/
          if [ -f _report/vulnlog-report.html ]; then
            cp _report/vulnlog-report.html _site/security-report.html
          else
            echo "Skipping security report bundle (no artifact downloaded)."
          fi
          sed "s|^VERSION=\".*\"|VERSION=\"${VERSION}\"|" \
              install/install.sh.template > _site/install
          cp install/uninstall.sh.template _site/uninstall
          sed -i "s/0\.13\.0/${VERSION}/g" _site/index.html
          echo 'vulnlog.dev' > _site/CNAME
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          include-hidden-files: 'true'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-docker:
    name: Publish Docker image
    needs: [ build-native-images ]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Fetch native binary
        uses: ./.github/actions/fetch-native-binary
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "value=${VERSION#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push release image
        uses: docker/build-push-action@v7
        with:
          context: modules/cli-app
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.value }}
            ${{ !contains(github.ref_name, '-') && format('ghcr.io/{0}:latest', github.repository) || '' }}

  publish-gradle-plugin:
    name: Publish Gradle plugin
    needs: [ generate-changelog ]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up JVM toolchain
        uses: ./.github/actions/setup-jvm
      - name: Publish Gradle plugin
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PLUGIN_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PLUGIN_SECRET }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ./gradlew :gradle-plugin:publishPlugins -PappVersion="$VERSION"
