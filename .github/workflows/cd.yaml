name: Continuous Deployment

on:
  push:
    tags:
      - "v0.1[0-9].*"

permissions:
  contents: write
  discussions: write

jobs:
  generate-changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_notes_body: ${{ steps.release-notes.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/changelog.toml
          args: --tag ${{ github.ref }} --github-repo ${{ github.repository }}
        env:
          OUTPUT: CHANGELOG.md
      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): update for ${{ github.ref }}" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: release-notes
        with:
          config: .github/release-notes.toml
          args: --latest --github-repo ${{ github.repository }}

  build-native-images:
    name: Build native image (${{ matrix.artifact-name }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: vulnlog-linux-amd64
          - os: macos-latest
            artifact-name: vulnlog-macos-aarch64
          - os: windows-latest
            artifact-name: vulnlog-windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build native image
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ./gradlew :next:nativeCompile --no-configuration-cache -PappVersion="$VERSION"
      - name: Package native image (Unix)
        if: runner.os != 'Windows'
        run: |
          cd next/cli-app/build/native/nativeCompile
          zip ${{ matrix.artifact-name }}.zip vulnlog
      - name: Package native image (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd next/cli-app/build/native/nativeCompile
          Compress-Archive -Path vulnlog.exe -DestinationPath "${{ matrix.artifact-name }}.zip"
      - name: Upload native image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: next/cli-app/build/native/nativeCompile/${{ matrix.artifact-name }}.zip

  publish-release:
    name: Publish release
    needs: [ generate-changelog, build-native-images ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build JVM distribution
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ./gradlew clean :next:distZip -PappVersion="$VERSION"
      - name: Download native images
        uses: actions/download-artifact@v4
        with:
          pattern: vulnlog-*
          path: native-images
          merge-multiple: true
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Vulnlog ${{ github.ref_name }}"
          prerelease: true
          body: |
            ${{needs.generate-changelog.outputs.release_notes_body}}

            👉 Full Changelog: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md
          files: |
            next/cli-app/build/distributions/*.zip
            native-images/*.zip
      - name: Create a new GitHub discussion
        id: create-discussion
        uses: abirismyname/create-discussion@main
        with:
          title: Vulnlog ${{ github.ref_name }} is released
          body: |
            Vulnlog ${{ github.ref_name }} is released!
            
            For a full description of changes, take a look at our [release notes](https://github.com/vulnlog/vulnlog/releases/tag/${{ github.ref_name }}).
          category-name: Announcements
          github-token: ${{ secrets.GITHUB_TOKEN }}
