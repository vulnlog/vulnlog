<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vulnlog vulnerability report.">
    <title>Vulnlog Report</title>
    <style>
        :root {
            --vl-primary-h: 325deg;
            --vl-primary-s: 97%;
            --vl-primary-l: 55%;
            --vl-link-h: 304deg;
            --vl-link-s: 38%;
            --vl-link-l: 42%;

            --vl-bg: #fff;
            --vl-text: #1a1a2e;
            --vl-text-secondary: #555e68;
            --vl-border: #dbdbdb;
            --vl-surface: #f5f5f5;
            --vl-hover: #fafafa;
            --vl-primary: hsl(var(--vl-primary-h) var(--vl-primary-s) var(--vl-primary-l));
            --vl-link: hsl(var(--vl-link-h) var(--vl-link-s) var(--vl-link-l));
            --vl-focus: hsl(var(--vl-primary-h) var(--vl-primary-s) var(--vl-primary-l));
            --vl-logo-text: #2e333d;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --vl-bg: #1a1a1a;
                --vl-text: #ebecf0;
                --vl-text-secondary: #a0a0a0;
                --vl-border: #3a3a3a;
                --vl-surface: #242424;
                --vl-hover: #2e2e2e;
                --vl-link: hsl(var(--vl-link-h) 50% 72%);
                --vl-logo-text: #ebecf0;
            }
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--vl-bg);
            color: var(--vl-text);
            line-height: 1.5;
            font-size: 1rem;
        }

        a {
            color: var(--vl-link);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        a:focus-visible {
            outline: 2px solid var(--vl-focus);
            outline-offset: 2px;
            border-radius: 2px;
        }

        .skip-link {
            position: absolute;
            left: -9999px;
            top: 0;
            background: var(--vl-primary);
            color: #fff;
            padding: 0.5rem 1rem;
            z-index: 100;
            font-size: 0.875rem;
        }

        .skip-link:focus {
            left: 0;
        }

        .container {
            max-width: 80rem;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Navbar */
        .navbar {
            display: flex;
            align-items: center;
            min-height: 3.25rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--vl-border);
            margin-bottom: 1.5rem;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
        }

        .navbar-brand svg {
            height: 2rem;
            width: auto;
        }

        .navbar-brand .logo-text {
            fill: var(--vl-logo-text);
        }

        /* Title section */
        .title {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.125;
            margin: 0 0 0.5rem;
        }

        .subtitle {
            font-size: 1.125rem;
            font-weight: 400;
            color: var(--vl-text-secondary);
            margin: 0 0 2rem;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
            margin-bottom: 2rem;
            table-layout: fixed;
        }

        caption {
            text-align: left;
            font-size: 0.8125rem;
            color: var(--vl-text-secondary);
            padding: 0.5rem 0;
            caption-side: bottom;
        }

        th, td {
            padding: 0.5em 0.75em;
            text-align: left;
            border: 1px solid var(--vl-border);
            vertical-align: top;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        th {
            background: var(--vl-surface);
            font-weight: 600;
            font-size: 0.8125rem;
            color: var(--vl-text-secondary);
            white-space: nowrap;
        }

        tbody tr:hover td {
            background: var(--vl-hover);
        }

        .col-ids {
            font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.8125rem;
        }

        .col-ids .alias {
            color: var(--vl-text-secondary);
            font-size: 0.75rem;
        }

        .col-short {
            white-space: nowrap;
        }

        .empty-state {
            padding: 2rem 0.75rem;
            text-align: center;
            color: var(--vl-text-secondary);
            font-style: italic;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--vl-border);
            padding: 1.5rem 0;
            text-align: center;
            font-size: 0.875rem;
            color: var(--vl-text-secondary);
        }
    </style>
</head>
<body>
<a href="#vuln-table" class="skip-link">Skip to vulnerability table</a>

<header>
    <div class="container">
        <nav class="navbar" aria-label="main navigation">
            <a class="navbar-brand" href="https://vulnlog.dev" aria-label="Vulnlog home">
                <svg width="154.64mm" height="49.784mm" viewBox="0 0 154.64 49.784" xmlns="http://www.w3.org/2000/svg"
                     xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-hidden="true" focusable="false">
                    <defs>
                        <linearGradient id="vl-grad">
                            <stop stop-color="#f200cf" offset="0"/>
                            <stop stop-color="#ff278f" offset="1"/>
                        </linearGradient>
                        <linearGradient id="vl-grad-a" x1="362.33" x2="390.12" y1="1070.1" y2="1070.1"
                                        gradientTransform="translate(-332.85 -997.27)" gradientUnits="userSpaceOnUse"
                                        xlink:href="#vl-grad"/>
                        <linearGradient id="vl-grad-b" x1="362.33" x2="390.12" y1="1070.1" y2="1070.1"
                                        gradientTransform="translate(-332.85 -997.27)" gradientUnits="userSpaceOnUse"
                                        xlink:href="#vl-grad"/>
                    </defs>
                    <g transform="translate(-29.478 -47.388)">
                        <path d="m44.734 74.91-4.2824 10.581h6.305l10.516-25.4h-6.5024z" fill="url(#vl-grad-a)"/>
                        <path d="m29.485 60.091 9.0005 21.636 3.1662-7.8238-5.6642-13.812z" fill="url(#vl-grad-b)"/>
                        <path class="logo-text"
                              d="m85.495 47.388v38.1h5.9945v-38.1zm36.763 0v38.1h5.9945v-38.1zm-13.556 12.192c-2.9972 0-5.7401 1.2698-7.6197 3.251v-2.743h-5.9945v25.4h5.9945v-13.716c0-4.0132 2.6925-6.5531 6.1469-6.5531 3.2004 0 5.4353 1.981 5.4353 6.2482v14.021h5.9945v-15.291c0-6.4516-4.0642-10.617-9.957-10.617zm34.833 0c-7.2644 0-13.208 5.8928-13.208 13.208 0 7.2644 5.9436 13.208 13.208 13.208 7.3152 0 13.208-5.9436 13.208-13.208 0-7.3152-5.8928-13.208-13.208-13.208zm26.764 0c-7.2644 0-12.598 5.9436-12.598 13.208s5.3338 13.208 12.598 13.208c3.2004 0 6.1469-1.6761 7.8233-3.7589v3.1492c0 3.81-2.7434 6.0963-7.4678 6.0963-2.4892 0-5.1817-0.91466-7.1629-2.5911l-4.1656 4.1656c2.9972 2.7432 7.2135 4.115 11.227 4.115 8.4328 0 13.564-4.6228 13.564-12.192v-24.892h-5.9945v3.1497c-1.6764-1.9812-4.6229-3.6577-7.8233-3.6577zm-111.97 0.50798v15.291c0 6.4516 4.0637 10.617 9.9565 10.617 2.9972 0 5.7406-1.2698 7.6202-3.251v2.743h5.9945v-25.4h-5.9945v13.716c0 3.9624-2.6925 6.5531-6.1469 6.5531-3.2004 0-5.4353-2.0318-5.4353-6.2482v-14.021zm85.21 5.4865c3.9624 0 7.2135 3.2511 7.2135 7.2135s-3.2511 7.2135-7.2135 7.2135c-3.9624 0-7.2135-3.2511-7.2135-7.2135s3.2511-7.2135 7.2135-7.2135zm27.374 0c3.9624 0 7.2135 3.2511 7.2135 7.2135s-3.2511 7.2135-7.2135 7.2135c-3.9624 0-7.214-3.2511-7.214-7.2135s3.2516-7.2135 7.214-7.2135z"/>
                    </g>
                </svg>
            </a>
        </nav>
        <h1 class="title" id="report-heading"></h1>
        <p class="subtitle" id="report-meta"></p>
        <p class="subtitle" id="report-date"></p>
    </div>
</header>

<main>
    <div class="container">
        <table id="vuln-table" aria-describedby="table-caption">
            <caption id="table-caption"></caption>
            <thead>
            <tr>
                <th scope="col">IDs</th>
                <th scope="col">Verdict</th>
                <th scope="col">Severity</th>
                <th scope="col">State</th>
                <th scope="col">Description</th>
                <th scope="col">Analysis</th>
                <th scope="col">Releases</th>
                <th scope="col">Fixed In</th>
            </tr>
            </thead>
            <tbody id="vuln-tbody"></tbody>
        </table>
    </div>
</main>

<footer>
    <div class="container">
        <p>
            Generated by <a href="https://vulnlog.dev">Vulnlog</a>.
            Visit <a href="https://vulnlog.dev">vulnlog.dev</a> for more information.
        </p>
    </div>
</footer>

<script>
    var VULNLOG_DATA = /*VULNLOG_DATA_PLACEHOLDER*/;
    (function () {
        var d = VULNLOG_DATA;

        document.title = d.project.name + ' \u2014 Vulnlog Report';
        document.getElementById('report-heading').textContent =
            'Vulnerability Report \u2014 ' + d.project.name;
        document.getElementById('report-meta').textContent =
            d.project.organization + ' \u2014 ' + d.project.author;
        var dateEl = document.getElementById('report-date');
        dateEl.textContent = 'Generated on ' + d.generatedAt;
        document.getElementById('table-caption').textContent =
            d.entries.length + (d.entries.length === 1 ? ' vulnerability entry' : ' vulnerability entries');

        var tbody = document.getElementById('vuln-tbody');

        if (d.entries.length === 0) {
            var tr = document.createElement('tr');
            var td = document.createElement('td');
            td.setAttribute('colspan', '8');
            td.className = 'empty-state';
            td.textContent = 'No vulnerability entries to display.';
            tr.appendChild(td);
            tbody.appendChild(tr);
            return;
        }

        d.entries.forEach(function (e) {
            var tr = document.createElement('tr');
            idsCell(tr, e);
            cell(tr, label(e.verdict), 'col-short');
            cell(tr, e.severity ? label(e.severity) : '', 'col-short');
            cell(tr, label(e.state), 'col-short');
            cell(tr, e.shortDescription || '');
            cell(tr, e.analysis || '');
            cell(tr, e.releases.join(', '));
            cell(tr, e.fixedIn.join(', '));
            tbody.appendChild(tr);
        });

        function idsCell(tr, e) {
            var td = document.createElement('td');
            td.className = 'col-ids';
            td.textContent = e.primaryId;
            var al = e.ids.filter(function (id) {
                return id !== e.primaryId;
            });
            al.forEach(function (id) {
                td.appendChild(document.createElement('br'));
                var span = document.createElement('span');
                span.className = 'alias';
                span.textContent = id;
                td.appendChild(span);
            });
            tr.appendChild(td);
        }

        function cell(tr, text, cls) {
            var td = document.createElement('td');
            td.textContent = text;
            if (cls) td.className = cls;
            tr.appendChild(td);
        }

        function label(v) {
            return v.replace(/_/g, ' ');
        }
    })();
</script>
</body>
</html>
