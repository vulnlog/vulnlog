<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     role="img" aria-labelledby="title desc"
     font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
    <title id="title">Vulnlog vulnerability reporting</title>
    <desc id="desc">Three steps: the engineer maintains the vulnlog.yaml file, the Vulnlog CLI generates a shareable vulnerability report from it, and peers and customers consume the report to learn what is affected, the impact, and which release ships the fix.</desc>

    <defs>
        <linearGradient id="pink" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0" stop-color="#f200cf"/>
            <stop offset="1" stop-color="#ff278f"/>
        </linearGradient>
        <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#fdf2f8"/>
            <stop offset="1" stop-color="#fce4f3"/>
        </linearGradient>

        <symbol id="logo" viewBox="0 0 154.64 49.784">
            <g stroke-width="5" transform="translate(-29.478 -47.388)">
                <path d="m44.734 74.91-4.2824 10.581h6.305l10.516-25.4h-6.5024z" fill="url(#pink)"/>
                <path d="m29.485 60.091 9.0005 21.636 3.1662-7.8238-5.6642-13.812z" fill="url(#pink)"/>
                <path fill="#2e333d"
                      d="m85.495 47.388v38.1h5.9945v-38.1zm36.763 0v38.1h5.9945v-38.1zm-13.556 12.192c-2.9972 0-5.7401 1.2698-7.6197 3.251v-2.743h-5.9945v25.4h5.9945v-13.716c0-4.0132 2.6925-6.5531 6.1469-6.5531 3.2004 0 5.4353 1.981 5.4353 6.2482v14.021h5.9945v-15.291c0-6.4516-4.0642-10.617-9.957-10.617zm34.833 0c-7.2644 0-13.208 5.8928-13.208 13.208 0 7.2644 5.9436 13.208 13.208 13.208 7.3152 0 13.208-5.9436 13.208-13.208 0-7.3152-5.8928-13.208-13.208-13.208zm26.764 0c-7.2644 0-12.598 5.9436-12.598 13.208s5.3338 13.208 12.598 13.208c3.2004 0 6.1469-1.6761 7.8233-3.7589v3.1492c0 3.81-2.7434 6.0963-7.4678 6.0963-2.4892 0-5.1817-.91466-7.1629-2.5911l-4.1656 4.1656c2.9972 2.7432 7.2135 4.115 11.227 4.115 8.4328 0 13.564-4.6228 13.564-12.192v-24.892h-5.9945v3.1497c-1.6764-1.9812-4.6229-3.6577-7.8233-3.6577zm-111.97.50798v15.291c0 6.4516 4.0637 10.617 9.9565 10.617 2.9972 0 5.7406-1.2698 7.6202-3.251v2.743h5.9945v-25.4h-5.9945v13.716c0 3.9624-2.6925 6.5531-6.1469 6.5531-3.2004 0-5.4353-2.0318-5.4353-6.2482v-14.021zm85.21 5.4865c3.9624 0 7.2135 3.2511 7.2135 7.2135s-3.2511 7.2135-7.2135 7.2135-7.2135-3.2511-7.2135-7.2135 3.2511-7.2135 7.2135-7.2135zm27.374 0c3.9624 0 7.2135 3.2511 7.2135 7.2135s-3.2511 7.2135-7.2135 7.2135-7.214-3.2511-7.214-7.2135 3.2516-7.2135 7.214-7.2135z"/>
            </g>
        </symbol>

        <!-- Step icons — stroked, 24x24, same family as on the website -->
        <symbol id="ic-doc" viewBox="0 0 24 24">
            <g fill="none" stroke="#d6249f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" x2="8" y1="13" y2="13"/>
                <line x1="16" x2="8" y1="17" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </g>
        </symbol>
        <symbol id="ic-report" viewBox="0 0 24 24">
            <g fill="none" stroke="#d6249f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="8" x2="13" y1="12" y2="12"/>
                <line x1="8" x2="8" y1="18" y2="16"/>
                <line x1="11" x2="11" y1="18" y2="14"/>
                <line x1="14" x2="14" y1="18" y2="15"/>
                <line x1="17" x2="17" y1="18" y2="13"/>
            </g>
        </symbol>
        <symbol id="ic-users" viewBox="0 0 24 24">
            <g fill="none" stroke="#d6249f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </g>
        </symbol>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)"/>

    <!-- Header -->
    <use href="#logo" x="60" y="50" width="200" height="64"/>
    <text x="1140" y="92" text-anchor="end" font-size="20" font-weight="700" fill="#d6249f" letter-spacing="2">
        VULNERABILITY REPORTING
    </text>

    <!-- Three steps at x = 200, 600, 1000 -->

    <!-- Step 1 -->
    <use href="#ic-doc" x="140" y="200" width="120" height="120"/>
    <text x="200" y="385" text-anchor="middle" font-size="22" font-weight="700" fill="#d6249f" letter-spacing="2">STEP 1</text>
    <text x="200" y="430" text-anchor="middle" font-size="26" font-weight="800" fill="#1a1a2e">Engineer maintains</text>
    <text x="200" y="462" text-anchor="middle" font-size="26" font-weight="800" fill="#1a1a2e">vulnlog.yaml</text>

    <!-- Connector 1 → 2 (vulnlog.yaml feeds the report) -->
    <path d="M 320 260 L 478 260" fill="none" stroke="#d6249f" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 12"/>
    <path d="M 478 251 L 494 260 L 478 269 Z" fill="#d6249f"/>

    <!-- Step 2 -->
    <use href="#ic-report" x="540" y="200" width="120" height="120"/>
    <text x="600" y="385" text-anchor="middle" font-size="22" font-weight="700" fill="#d6249f" letter-spacing="2">STEP 2</text>
    <text x="600" y="430" text-anchor="middle" font-size="26" font-weight="800" fill="#1a1a2e">Vulnlog generates</text>
    <text x="600" y="462" text-anchor="middle" font-size="26" font-weight="800" fill="#1a1a2e">a vulnerability report</text>

    <!-- Connector 3 → 2 (peers and customers fetch the report) -->
    <path d="M 880 260 L 722 260" fill="none" stroke="#d6249f" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 12"/>
    <path d="M 722 251 L 706 260 L 722 269 Z" fill="#d6249f"/>

    <!-- Step 3 -->
    <use href="#ic-users" x="940" y="200" width="120" height="120"/>
    <text x="1000" y="385" text-anchor="middle" font-size="22" font-weight="700" fill="#d6249f" letter-spacing="2">STEP 3</text>
    <text x="1000" y="430" text-anchor="middle" font-size="26" font-weight="800" fill="#1a1a2e">Peers &amp; customers</text>
    <text x="1000" y="462" text-anchor="middle" font-size="26" font-weight="800" fill="#1a1a2e">stay informed</text>

    <!-- Bottom tagline -->
    <text x="600" y="575" text-anchor="middle" font-size="20" font-weight="600" fill="#555570">
        What is affected, the impact, and the release that ships the fix — all in one shareable report.
    </text>
</svg>
