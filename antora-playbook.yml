site:
  title: Vulnlog Documentation
  url: https://vulnlog.dev/docs
  start_page: vulnlog::index.adoc

content:
  sources:
    - url: .
      branches:
        - release/0.15
        - release/0.14
      start_path: docs

urls:
  latest_version_segment: latest
  latest_version_segment_strategy: redirect:from

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  supplemental_files: ./docs/supplemental-ui

output:
  dir: ./build/docs
